name: EAS Update (OTA)

# Ships JS/TS/asset changes over-the-air to already-installed builds.
# No native rebuild — users get the update on next app launch.
on:
  push:
    branches:
      - main
    paths:
      - 'mobile/src/**'
      - 'mobile/app/**'
      - 'mobile/App.tsx'
      - 'mobile/index.ts'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    name: Publish OTA update
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        working-directory: mobile
        run: eas update --branch preview --message "OTA ${{ github.sha }}" --non-interactive

      - name: Ensure channel 'preview' points to branch 'preview'
        working-directory: mobile
        run: eas channel:edit preview --branch preview --non-interactive || true
